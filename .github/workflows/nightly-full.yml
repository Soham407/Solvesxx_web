name: Nightly Full

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-full
  cancel-in-progress: false

env:
  CI: true
  NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  E2E_VISUAL: "1"

jobs:
  full-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start app
        run: |
          npm run start -- --hostname 127.0.0.1 > app.log 2>&1 &
          echo $! > app.pid

          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              exit 0
            fi
            sleep 5
          done

          echo "Application failed to start"
          cat app.log
          exit 1

      - name: Run nightly full stack
        run: npm run test:ci:nightly

      - name: Stop app
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill "$(cat app.pid)" || true
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-nightly-full-${{ github.run_id }}
          path: playwright-report
          if-no-files-found: warn
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-nightly-full-${{ github.run_id }}
          path: test-results
          if-no-files-found: warn
          retention-days: 30

      - name: Upload scope coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scope-coverage-nightly-full-${{ github.run_id }}
          path: |
            test-results/scope-coverage*
            test-results/scope-coverage/**
          if-no-files-found: ignore
          retention-days: 30
